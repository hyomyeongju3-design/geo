<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dash</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; margin:auto; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 400;

let player = {x:150, y:300, w:40, h:40, vel:0};
let gravity = 0.85;
let jump = -14.5;

let speed = 6;
let frame = 0;
let started = false;
let dead = false;

let obstacles = [];
let pads = [];
let particles = [];

let BPM = 90;
let beat = Math.floor((60/BPM)*60);

let audio = new Audio("music.mp3");
audio.loop = true;

function playMusic(){
    if(!started){
        audio.currentTime = 0;
        audio.play().catch(()=>{});
        started = true;
    }
}

function input(){
    if(dead){
        location.reload();
        return;
    }
    playMusic();
    if(player.y + player.h >= 340){
        player.vel = jump;
    }
}

document.addEventListener("keydown", e=>{
    if(e.code==="Space") input();
});

canvas.addEventListener("mousedown", input);
canvas.addEventListener("touchstart", input);

function spawnBlock(h, gap=0){
    obstacles.push({x:900+gap, y:340-h, w:30, h:h});
}

function spawnPad(gap=0){
    pads.push({x:900+gap, y:320, w:40, h:10});
}

function level(){
    if(frame === beat*1){
        spawnBlock(40);
    }

    if(frame === beat*2){
        spawnBlock(30);
        spawnBlock(30,50);
    }

    if(frame === beat*3){
        spawnPad(0);
        spawnBlock(100,80);
    }

    if(frame === beat*5){
        spawnBlock(40);
        spawnBlock(40,40);
        spawnBlock(60,80);
    }

    if(frame === beat*7){
        spawnPad(0);
        spawnBlock(120,90);
    }

    if(frame === beat*9){
        spawnBlock(30);
        spawnBlock(50,40);
        spawnBlock(70,80);
    }
}

function update(){
    if(dead){
        particles.forEach(p=>{
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
        });
        return;
    }

    frame++;
    level();

    player.vel += gravity;
    player.y += player.vel;

    if(player.y + player.h >= 340){
        player.y = 340 - player.h;
        player.vel = 0;
    }

    obstacles.forEach(o=>o.x -= speed);
    pads.forEach(p=>p.x -= speed);

    collision();
}

function collision(){
    for(let o of obstacles){
        if(player.x < o.x+o.w &&
           player.x+player.w > o.x &&
           player.y < o.y+o.h &&
           player.y+player.h > o.y){

            dead = true;

            for(let i=0;i<25;i++){
                particles.push({
                    x:player.x+20,
                    y:player.y+20,
                    vx:(Math.random()-0.5)*10,
                    vy:(Math.random()-0.5)*10,
                    life:30
                });
            }
        }
    }

    for(let p of pads){
        if(player.x < p.x+p.w &&
           player.x+player.w > p.x &&
           player.y + player.h >= p.y &&
           player.y + player.h <= p.y + 10 &&
           player.vel >= 0){
            player.vel = -18;
        }
    }
}

function draw(){
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,900,400);

    if(!dead){
        ctx.fillStyle="white";
        ctx.fillRect(player.x, player.y, 40, 40);
    }

    ctx.fillStyle="#ff4444";
    obstacles.forEach(o=>{
        ctx.fillRect(o.x,o.y,o.w,o.h);
    });

    ctx.fillStyle="#00ffcc";
    pads.forEach(p=>{
        ctx.fillRect(p.x,p.y,p.w,p.h);
    });

    particles.forEach(p=>{
        ctx.fillStyle="white";
        ctx.fillRect(p.x,p.y,4,4);
    });

    ctx.strokeStyle="white";
    ctx.beginPath();
    ctx.moveTo(0,340);
    ctx.lineTo(900,340);
    ctx.stroke();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
